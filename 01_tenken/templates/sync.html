<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#2c5f8a">
  <title>DB同期設定 — 日常点検</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .sync-card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,.1);
      padding: .85rem 1rem;
      margin-bottom: 1rem;
    }
    .sync-card h2 {
      font-size: .9rem;
      font-weight: 700;
      color: #2c5f8a;
      margin: 0 0 .75rem;
    }
    .form-row {
      display: flex;
      flex-direction: column;
      gap: .5rem;
      margin-bottom: .65rem;
    }
    .form-row label {
      font-size: .8rem;
      font-weight: 600;
      color: #444;
    }
    .form-row input {
      padding: .4rem .65rem;
      border: 1px solid #d0d8e4;
      border-radius: 8px;
      font-size: .9rem;
      width: 100%;
      box-sizing: border-box;
    }
    .form-row .hint {
      font-size: .73rem;
      color: #888;
      margin-top: .1rem;
    }
    .url-preview {
      background: #f0f4f8;
      border-radius: 6px;
      padding: .5rem .75rem;
      font-size: .78rem;
      color: #555;
      font-family: monospace;
      word-break: break-all;
      margin-bottom: .65rem;
    }
    .btn-row {
      display: flex;
      gap: .6rem;
      flex-wrap: wrap;
    }
    .btn-primary {
      padding: .45rem 1rem;
      background: #2c5f8a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-primary:disabled {
      opacity: .5;
      cursor: default;
    }
    .btn-danger {
      padding: .45rem 1rem;
      background: #27ae60;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-danger:disabled {
      opacity: .5;
      cursor: default;
    }
    .save-msg {
      font-size: .8rem;
      padding: .35rem .6rem;
      border-radius: 6px;
      display: none;
    }
    .save-msg.ok  { background: #e8f5e9; color: #1b5e20; display: block; }
    .save-msg.err { background: #fdecea; color: #b71c1c; display: block; }
    #sync-log {
      background: #1a1a2e;
      color: #a8d8a8;
      border-radius: 8px;
      padding: .75rem 1rem;
      font-family: monospace;
      font-size: .78rem;
      line-height: 1.6;
      min-height: 120px;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      display: none;
    }
    #sync-log.visible { display: block; }
    .log-ok  { color: #69d669; }
    .log-err { color: #ff6b6b; }
    .log-warn { color: #ffd93d; }
  </style>
</head>
<body>

  <header>
    <h1>🔄 DB同期設定</h1>
  </header>

  <main style="padding: 1rem">

    <!-- 設定フォーム -->
    <div class="sync-card">
      <h2>⚙️ サーバ接続設定</h2>

      <div class="form-row">
        <label for="server-ip">サーバ IP アドレス</label>
        <input type="text" id="server-ip" placeholder="192.168.10.1" inputmode="url">
        <span class="hint">同期先サーバ（X260 AP）のIPアドレス</span>
      </div>

      <div class="form-row">
        <label for="server-port">ポート番号</label>
        <input type="number" id="server-port" placeholder="5400" min="1" max="65535" inputmode="numeric">
      </div>

      <div class="form-row">
        <label for="db-path">DBファイルパス</label>
        <input type="text" id="db-path" placeholder="/data/data/com.termux/files/home/plantapps/01_tenken/tenken.db">
        <span class="hint">アップロードする SQLite ファイルの絶対パス</span>
      </div>

      <div class="url-preview" id="url-preview">
        アップロード先: <span id="preview-upload"></span><br>
        ステータス確認: <span id="preview-status"></span>
      </div>

      <div class="btn-row">
        <button class="btn-primary" id="save-btn">💾 設定を保存</button>
        <span class="save-msg" id="save-msg"></span>
      </div>
    </div>

    <!-- 同期実行 -->
    <div class="sync-card">
      <h2>▶️ 同期実行</h2>
      <p style="font-size:.82rem;color:#555;margin:0 0 .75rem">
        設定済みのサーバへ tenken.db をアップロードします。<br>
        Wi-Fi でサーバに接続されている必要があります。
      </p>
      <div class="btn-row" style="margin-bottom:.75rem">
        <button class="btn-danger" id="run-btn">🔄 同期を実行</button>
      </div>
      <div id="sync-log"></div>
    </div>

  </main>

  {% set active_app = 'inspection' %}
  {% include 'bottom_nav.html' %}

  <script>
    const serverIpEl   = document.getElementById('server-ip');
    const serverPortEl = document.getElementById('server-port');
    const dbPathEl     = document.getElementById('db-path');
    const saveBtn      = document.getElementById('save-btn');
    const saveMsg      = document.getElementById('save-msg');
    const runBtn       = document.getElementById('run-btn');
    const syncLog      = document.getElementById('sync-log');
    const previewUpload = document.getElementById('preview-upload');
    const previewStatus = document.getElementById('preview-status');

    function updatePreview() {
      const ip   = serverIpEl.value.trim() || '…';
      const port = serverPortEl.value.trim() || '…';
      previewUpload.textContent = `http://${ip}:${port}/api/tenken/upload`;
      previewStatus.textContent = `http://${ip}:${port}/api/tenken/status`;
    }

    serverIpEl.addEventListener('input', updatePreview);
    serverPortEl.addEventListener('input', updatePreview);

    // 設定読み込み
    async function loadConfig() {
      try {
        const res  = await fetch('/api/sync/config');
        const cfg  = await res.json();
        serverIpEl.value   = cfg.server_ip   ?? '';
        serverPortEl.value = cfg.server_port ?? '';
        dbPathEl.value     = cfg.db_path     ?? '';
        updatePreview();
      } catch (e) {
        console.error('設定読み込みエラー:', e);
      }
    }

    // 設定保存
    saveBtn.addEventListener('click', async () => {
      saveMsg.className = 'save-msg';
      saveMsg.textContent = '';
      saveBtn.disabled = true;
      try {
        const res = await fetch('/api/sync/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            server_ip:   serverIpEl.value.trim(),
            server_port: parseInt(serverPortEl.value, 10),
            db_path:     dbPathEl.value.trim(),
          }),
        });
        const json = await res.json();
        if (res.ok) {
          saveMsg.className = 'save-msg ok';
          saveMsg.textContent = '✅ 保存しました';
        } else {
          saveMsg.className = 'save-msg err';
          saveMsg.textContent = '❌ ' + (json.error || '保存に失敗しました');
        }
      } catch (e) {
        saveMsg.className = 'save-msg err';
        saveMsg.textContent = '❌ 通信エラー: ' + e.message;
      } finally {
        saveBtn.disabled = false;
        setTimeout(() => { saveMsg.className = 'save-msg'; }, 3000);
      }
    });

    // 同期実行（SSE）
    runBtn.addEventListener('click', () => {
      runBtn.disabled = true;
      runBtn.textContent = '⏳ 同期中...';
      syncLog.className = 'visible';
      syncLog.innerHTML = '';

      fetch('/api/sync/run', { method: 'POST' })
        .then(res => {
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buf = '';

          function push(chunk) {
            buf += decoder.decode(chunk, { stream: true });
            const lines = buf.split('\n');
            buf = lines.pop();
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              const msg = line.slice(6);
              if (msg === '[DONE:ok]') {
                runBtn.disabled = false;
                runBtn.textContent = '🔄 同期を実行';
                return;
              }
              if (msg === '[DONE:error]') {
                runBtn.disabled = false;
                runBtn.textContent = '🔄 同期を実行';
                return;
              }
              const span = document.createElement('span');
              if (msg.includes('エラー')) {
                span.className = 'log-err';
              } else if (msg.includes('警告') || msg.includes('失敗')) {
                span.className = 'log-warn';
              } else if (msg.includes('完了') || msg.includes('成功')) {
                span.className = 'log-ok';
              }
              span.textContent = msg + '\n';
              syncLog.appendChild(span);
              syncLog.scrollTop = syncLog.scrollHeight;
            }
          }

          function read() {
            return reader.read().then(({ done, value }) => {
              if (done) {
                runBtn.disabled = false;
                runBtn.textContent = '🔄 同期を実行';
                return;
              }
              push(value);
              return read();
            });
          }
          return read();
        })
        .catch(e => {
          const span = document.createElement('span');
          span.className = 'log-err';
          span.textContent = '通信エラー: ' + e.message + '\n';
          syncLog.appendChild(span);
          runBtn.disabled = false;
          runBtn.textContent = '🔄 同期を実行';
        });
    });

    loadConfig();
  </script>
</body>
</html>
