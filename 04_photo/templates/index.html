<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メディア転送 | Plant Media</title>
    <style>
        :root {
            --nav-bg: #1e293b;
            --accent: #0ea5e9;
            --accent-dark: #0284c7;
            --success: #16a34a;
            --success-bg: #f0fdf4;
            --danger: #dc2626;
            --danger-bg: #fef2f2;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ---- Navigation ---- */
        nav.app-nav {
            background: var(--nav-bg);
            color: #fff;
            padding: 0 16px;
            display: flex;
            align-items: center;
            height: 56px;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .nav-brand {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--accent);
            white-space: nowrap;
        }
        .nav-links {
            display: flex;
            gap: 4px;
            margin-left: auto;
        }
        .nav-link {
            color: #cbd5e1;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
        }
        .nav-link:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .nav-link.active { background: var(--accent); color: #fff; }

        /* ---- Page layout ---- */
        .page {
            max-width: 720px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }

        .page-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--accent);
        }

        /* ---- Card ---- */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .card-label {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 12px;
        }

        /* ---- Drop zone ---- */
        #drop-zone {
            border: 2px dashed #94a3b8;
            border-radius: 10px;
            padding: 36px 20px;
            text-align: center;
            color: var(--muted);
            font-size: 16px;
            cursor: pointer;
            background: #f8fafc;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
            user-select: none;
        }
        #drop-zone.dragover {
            background: #e0f2fe;
            border-color: var(--accent);
            color: var(--accent-dark);
        }
        #drop-zone .drop-icon { font-size: 40px; margin-bottom: 10px; }
        #drop-zone .drop-sub { font-size: 13px; margin-top: 6px; color: #94a3b8; }

        /* ---- Buttons ---- */
        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 13px 20px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: filter 0.15s, transform 0.1s;
            flex: 1;
            justify-content: center;
            min-height: 50px;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { filter: brightness(1.1); }
        .btn-secondary { background: #334155; color: #fff; }
        .btn-secondary:hover { filter: brightness(1.15); }

        #imageInput, #fileInput { display: none; }

        /* ---- Progress ---- */
        #progressWrap { display: none; margin-top: 14px; }
        .progress-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .progress-bar {
            width: 100%;
            background: #e2e8f0;
            border-radius: 6px;
            height: 22px;
            overflow: hidden;
        }
        .progress-inner {
            width: 0;
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #38bdf8);
            border-radius: 6px;
            text-align: center;
            line-height: 22px;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            transition: width 0.25s ease;
        }

        /* ---- Results ---- */
        #result-area { margin-top: 4px; }
        .result-section-title {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
        }
        .result-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 4px solid transparent;
        }
        .result-item.success {
            background: var(--success-bg);
            border-left-color: var(--success);
        }
        .result-item.error {
            background: var(--danger-bg);
            border-left-color: var(--danger);
        }
        .result-thumb {
            width: 52px;
            height: 52px;
            object-fit: cover;
            border-radius: 6px;
            flex-shrink: 0;
            border: 1px solid var(--border);
        }
        .result-icon {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }
        .result-text { flex: 1; min-width: 0; }
        .result-filename {
            font-weight: 600;
            font-size: 14px;
            word-break: break-all;
            color: var(--text);
        }
        .result-status {
            font-size: 13px;
            margin-top: 2px;
        }
        .result-status.ok { color: var(--success); }
        .result-status.err { color: var(--danger); }
    </style>
</head>
<body>

<nav class="app-nav">
    <span class="nav-brand">&#9881; PLANT MEDIA</span>
    <div class="nav-links">
        <a href="/photo" class="nav-link active">&#11014; 転送</a>
        <a href="/list" class="nav-link">&#128247; 一覧</a>
    </div>
</nav>

<div class="page">
    <div class="page-title">メディア転送</div>

    <div class="card">
        <div class="card-label">ファイルをドロップまたは選択</div>
        <div id="drop-zone">
            <div class="drop-icon">&#128228;</div>
            <div>ここにファイルをドロップ</div>
            <div class="drop-sub">複数ファイル同時転送可</div>
        </div>
        <div class="btn-row">
            <label for="imageInput" class="btn btn-primary">
                &#128247; カメラ / 写真
            </label>
            <input type="file" accept="image/*" capture="camera" id="imageInput" multiple>

            <label for="fileInput" class="btn btn-secondary">
                &#128193; その他ファイル
            </label>
            <input type="file" accept="*" id="fileInput" multiple>
        </div>

        <div id="progressWrap">
            <div class="progress-label">転送中...</div>
            <div class="progress-bar">
                <div class="progress-inner" id="progressInner">0%</div>
            </div>
        </div>
    </div>

    <div class="card" id="result-card" style="display:none;">
        <div class="result-section-title">転送結果</div>
        <div id="result-area"></div>
    </div>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const progressWrap = document.getElementById('progressWrap');
    const progressInner = document.getElementById('progressInner');
    const resultArea = document.getElementById('result-area');
    const resultCard = document.getElementById('result-card');

    async function uploadFiles(files) {
        const fileArray = Array.from(files);
        if (fileArray.length === 0) return;
        progressWrap.style.display = 'block';
        resultCard.style.display = 'block';
        setProgress(0);
        for (let i = 0; i < fileArray.length; i++) {
            const file = fileArray[i];
            const savedName = buildFilename(file);
            await uploadOne(file, savedName);
            setProgress(Math.round(((i + 1) / fileArray.length) * 100));
        }
        progressWrap.style.display = 'none';
    }

    function buildFilename(file) {
        const isImage = file.type.startsWith('image/');
        if (isImage) {
            const now = new Date();
            const pad = n => String(n).padStart(2, '0');
            const base = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
            const ext = file.name.includes('.') ? file.name.split('.').pop() : 'jpg';
            return `${base}.${ext}`;
        }
        return file.name;
    }

    function uploadOne(file, savedName) {
        return new Promise(resolve => {
            const formData = new FormData();
            formData.append('image', file, savedName);
            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/upload', true);
            xhr.onload = function () {
                if (xhr.status === 200) {
                    const res = JSON.parse(xhr.responseText);
                    addResult(file, savedName, !res.error, res.error || null);
                } else {
                    addResult(file, savedName, false, 'サーバーエラー (' + xhr.status + ')');
                }
                resolve();
            };
            xhr.onerror = function () {
                addResult(file, savedName, false, '通信エラー');
                resolve();
            };
            xhr.send(formData);
        });
    }

    function setProgress(pct) {
        progressInner.style.width = pct + '%';
        progressInner.textContent = pct + '%';
    }

    function addResult(file, savedName, success, errorMsg) {
        const item = document.createElement('div');
        item.className = 'result-item ' + (success ? 'success' : 'error');

        if (success && file.type.startsWith('image/')) {
            const img = document.createElement('img');
            img.src = '/media/' + savedName;
            img.className = 'result-thumb';
            img.alt = savedName;
            item.appendChild(img);
        } else {
            const icon = document.createElement('div');
            icon.className = 'result-icon';
            icon.textContent = success ? (file.type.startsWith('video/') ? '🎬' : '📄') : '❌';
            item.appendChild(icon);
        }

        const text = document.createElement('div');
        text.className = 'result-text';
        text.innerHTML = `
            <div class="result-filename">${savedName}</div>
            <div class="result-status ${success ? 'ok' : 'err'}">${success ? '転送完了' : 'エラー: ' + errorMsg}</div>
        `;
        item.appendChild(text);
        resultArea.appendChild(item);
    }

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        uploadFiles(e.dataTransfer.files);
    });
    dropZone.addEventListener('click', () => document.getElementById('fileInput').click());
    document.getElementById('imageInput').addEventListener('change', function () { uploadFiles(this.files); this.value = ''; });
    document.getElementById('fileInput').addEventListener('change', function () { uploadFiles(this.files); this.value = ''; });
</script>

{% set active_app = 'photo' %}
{% include 'bottom_nav.html' %}
</body>
</html>
