{% extends "base.html" %}
{% block title %}ダッシュボード - 機器台帳管理システム{% endblock %}

{% block content %}
<h4 class="mb-3"><i class="bi bi-speedometer2 me-2"></i>ダッシュボード</h4>

<!-- 統計カード -->
<div class="row g-3 mb-4" id="stats-row">
  <div class="col-6 col-md-4 col-lg-2">
    <div class="card text-center border-primary">
      <div class="card-body py-2">
        <div class="fs-4 fw-bold text-primary" id="stat-total">-</div>
        <div class="small text-muted">総機器数</div>
      </div>
    </div>
  </div>
  <div class="col-6 col-md-4 col-lg-2">
    <div class="card text-center border-success">
      <div class="card-body py-2">
        <div class="fs-4 fw-bold text-success" id="stat-active">-</div>
        <div class="small text-muted">稼働中</div>
      </div>
    </div>
  </div>
  <div class="col-6 col-md-4 col-lg-2">
    <div class="card text-center border-warning">
      <div class="card-body py-2">
        <div class="fs-4 fw-bold text-warning" id="stat-stopped">-</div>
        <div class="small text-muted">停止</div>
      </div>
    </div>
  </div>
  <div class="col-6 col-md-4 col-lg-2">
    <div class="card text-center border-secondary">
      <div class="card-body py-2">
        <div class="fs-4 fw-bold text-secondary" id="stat-removed">-</div>
        <div class="small text-muted">撤去</div>
      </div>
    </div>
  </div>
  <div class="col-6 col-md-4 col-lg-2">
    <div class="card text-center border-danger">
      <div class="card-body py-2">
        <div class="fs-4 fw-bold text-danger" id="stat-aging">-</div>
        <div class="small text-muted">老朽化アラート</div>
      </div>
    </div>
  </div>
</div>

<div class="row g-3">
  <!-- 最近更新された機器 -->
  <div class="col-12 col-xl-6">
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="bi bi-clock-history me-1"></i>最近更新された機器</span>
        <a href="/equipment" class="btn btn-sm btn-outline-primary">一覧を見る</a>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-sm table-hover mb-0">
            <thead class="table-light">
              <tr>
                <th>機器名称</th>
                <th>施設名称</th>
                <th>稼働状況</th>
                <th>更新日時</th>
              </tr>
            </thead>
            <tbody id="recent-table-body">
              <tr><td colspan="4" class="text-center text-muted py-3">読み込み中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- 老朽化アラート -->
  <div class="col-12 col-xl-6">
    <div class="card border-danger">
      <div class="card-header bg-danger text-white d-flex justify-content-between align-items-center">
        <span><i class="bi bi-exclamation-triangle me-1"></i>老朽化アラート Top10 (老朽化率≥80%)</span>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-sm table-hover mb-0">
            <thead class="table-light">
              <tr>
                <th>機器名称</th>
                <th>施設</th>
                <th>大分類</th>
                <th>経過年数</th>
                <th>老朽化率</th>
              </tr>
            </thead>
            <tbody id="aging-table-body">
              <tr><td colspan="5" class="text-center text-muted py-3">読み込み中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadDashboard() {
  try {
    const res = await fetch('/api/dashboard/stats');
    const json = await res.json();
    if (!json.success) return;
    const { stats, top_aging } = json.data;

    document.getElementById('stat-total').textContent = stats.total.toLocaleString();
    document.getElementById('stat-active').textContent = stats.active.toLocaleString();
    document.getElementById('stat-stopped').textContent = stats.stopped.toLocaleString();
    document.getElementById('stat-removed').textContent = stats.removed.toLocaleString();
    document.getElementById('stat-aging').textContent = stats.aging_alert_count.toLocaleString();

    // 老朽化アラートテーブル
    const agingBody = document.getElementById('aging-table-body');
    if (top_aging.length === 0) {
      agingBody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">データなし</td></tr>';
    } else {
      agingBody.innerHTML = top_aging.map(item => {
        const rate = item.aging_rate !== null ? item.aging_rate.toFixed(1) : '-';
        const badgeClass = item.aging_rate >= 80 ? 'badge-aging-red' : (item.aging_rate >= 60 ? 'badge-aging-yellow' : 'badge-aging-green');
        return `<tr>
          <td><a href="/equipment/${item.id}">${escHtml(item.equipment_name)}</a></td>
          <td>${escHtml(item.facility_name || '')}</td>
          <td>${escHtml(item.category_l || '')}</td>
          <td>${item.elapsed_years !== null ? item.elapsed_years.toFixed(1) + '年' : '-'}</td>
          <td><span class="aging-badge ${badgeClass}">${rate}%</span></td>
        </tr>`;
      }).join('');
    }
  } catch (e) {
    console.error(e);
  }

  try {
    const res = await fetch('/api/equipment?sort=updated_at&page=1&per_page=10');
    const json = await res.json();
    if (!json.success) return;
    const { items } = json.data;

    const tbody = document.getElementById('recent-table-body');
    if (items.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">データなし</td></tr>';
    } else {
      tbody.innerHTML = items.map(item => {
        const statusClass = item.op_status === '稼働中' ? 'text-success' : (item.op_status === '停止' ? 'text-warning' : 'text-secondary');
        const updatedAt = item.updated_at ? item.updated_at.substring(0, 16) : '-';
        return `<tr>
          <td><a href="/equipment/${item.id}">${escHtml(item.equipment_name)}</a></td>
          <td>${escHtml(item.facility_name || '')}</td>
          <td class="${statusClass}">${escHtml(item.op_status || '')}</td>
          <td>${updatedAt}</td>
        </tr>`;
      }).join('');
    }
  } catch (e) {
    console.error(e);
  }
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadDashboard();
</script>
{% endblock %}
